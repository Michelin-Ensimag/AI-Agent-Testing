name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Ruff
        run: uv tool install ruff

      - name: Check code formatting
        run: ruff format --check .

      - name: Lint code
        run: ruff check .

      - name: Install Bandit
        run: uv tool install bandit

      - name: Security Scan (Bandit)
        run: bandit -r src/ -x src/tests/ # Ignore tests files, since we use asserts for pytest

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pytest-cov

      - name: Run unit tests with Coverage Quality Gate
        # This runs all tests in test_unit/ and fails if coverage is below 75%
        run: uv run pytest --cov=src --cov-fail-under=75 src/tests/test_unit/

  deepeval-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      # Fails the job if paid models are detected
      - name: Safeguard - Check Free Model Usage
        run: uv run pytest -s src/tests/test_integration/test_model_safeguards.py

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Start Copilot API Proxy
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
        run: |
          bunx @jeffreycao/copilot-api@latest start --github-token $GH_TOKEN &

          echo "Waiting for API to start..."
          timeout 30 bash -c 'while ! curl -s http://localhost:4141/v1/models > /dev/null; do sleep 1; done'
          echo "API is up!"

      # DEEPEVAL TESTS (Outputting to Allure)
      - name: Run DeepEval Tests - Consistency
        run: uv run pytest --alluredir=allure-results src/tests/test_consistency/
        if: always()

      - name: Run DeepEval Tests - Judge LLM
        run: uv run pytest --alluredir=allure-results src/tests/test_judge_llm/
        if: always()

      # - name: Run DeepEval Tests - Answers
      #   run: uv run pytest --alluredir=allure-results src/tests/test_answers/
      #   if: always()

      # GENERATE ALLURE REPORT, STORE ARTIFACT, AND PREPARE GITHUB PAGES DEPLOYMENT
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure Report for GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-allure-report:
    if: github.ref == 'refs/heads/main' && always()
    needs: deepeval-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
