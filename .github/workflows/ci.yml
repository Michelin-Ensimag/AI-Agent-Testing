name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Ruff
        run: uv tool install ruff

      - name: Check code formatting
        run: ruff format --check .

      - name: Lint code
        run: ruff check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run pytest - test_agent_logic
        run: uv run pytest src/tests/test_unit/test_agent_logic.py

      - name: Run pytest - test_mcp_server_strat_pred
        run: uv run pytest src/tests/test_unit/test_mcp_server_strat_pred.py

  deeplm-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      # Fails the job if paid models are detected
      - name: Safeguard - Check Free Model Usage
        run: uv run pytest -s src/tests/test_integration/test_model_safeguards.py

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Start Copilot API Proxy
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
        run: |
          bunx @jeffreycao/copilot-api@latest start --github-token $GH_TOKEN &

          echo "Waiting for API to start..."
          timeout 30 bash -c 'while ! curl -s http://localhost:4141/v1/models > /dev/null; do sleep 1; done'
          echo "API is up!"

      - name: Run test_consistency
        run: uv run pytest src/tests/test_judge_llm/test_consistency.py
