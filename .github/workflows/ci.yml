name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install Ruff
        run: uv tool install ruff

      - name: Check code formatting
        run: ruff format --check .

      - name: Lint code
        run: ruff check .

      - name: Install Bandit
        run: uv tool install bandit

      - name: Security Scan (Bandit)
        run: bandit -r src/ -x src/tests/ # Ignore tests files, since we use asserts for pytest

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pytest-cov

      - name: Run unit tests with Coverage Quality Gate
        # This runs all tests in test_unit/ and fails if coverage is below 75%
        run: uv run pytest --cov=src --cov-fail-under=75 src/tests/test_unit/

  deepeval-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Let all tests finish even if one fails
      matrix:
        # ============================================
        # ADD OR REMOVE DEEPEVAL TEST FILES HERE
        # ============================================
        test_file:
          - src/tests/test_consistency/test_consistency.py
          - src/tests/test_judge_llm/test_judge_consistency.py
          - src/tests/test_answers/test_agent_answers.py
          - src/tests/test_answers/test_agent_pred_prompt.py
          - src/tests/test_answers/test_prompt.py
          # - (add more tests)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync

      # Fails the job if paid models are detected
      - name: Safeguard - Check Free Model Usage
        run: uv run pytest -s src/tests/test_integration/test_model_safeguards.py

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Start Copilot API Proxy
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
        run: |
          bunx @jeffreycao/copilot-api@latest start --github-token $GH_TOKEN &
          echo "Waiting for API to start..."
          timeout 30 bash -c 'while ! curl -s http://localhost:4141/v1/models > /dev/null; do sleep 1; done'
          echo "API is up!"

      - name: Run DeepEval Test
        run: uv run deepeval test run ${{ matrix.test_file }}
        continue-on-error: true # Keep going so we can upload the artifact even if the test fails

      - name: Prepare JSON Artifact
        run: |
          mkdir -p deepeval_results
          BASENAME=$(basename "${{ matrix.test_file }}" .py)
          if [ -f .deepeval/.latest_test_run.json ]; then
            cp .deepeval/.latest_test_run.json "deepeval_results/${BASENAME}.json"
          fi

      - name: Upload Test Artifact
        uses: actions/upload-artifact@v7
        with:
          # Use job index to ensure unique artifact names per matrix run
          name: deepeval-result-${{ strategy.job-index }}
          path: deepeval_results/*.json
          retention-days: 1

  generate-report:
    needs: deepeval-tests
    if: always() # Run this even if some matrix tests failed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Download all Test Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deepeval-result-*
          path: artifacts
          merge-multiple: true # This dumps all JSONs into a single folder

      - name: Move artifacts to correct folder
        run: |
          mkdir -p deepeval_results
          # Move everything from the downloaded artifacts folder to where the python script expects it
          mv artifacts/* deepeval_results/ || echo "No artifacts found"

      - name: Generate Custom HTML Report
        run: uv run python src/scripts/generate_report.py

      - name: Upload Report for GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: gh-pages-build

      - name: Enforce Matrix Status
        # We need to manually fail this aggregation job if the preceding matrix failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "❌ One or more DeepEval matrix tests failed! Failing the pipeline."
          exit 1

  deploy-html-report:
    if: github.ref == 'refs/heads/main' && always()
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
