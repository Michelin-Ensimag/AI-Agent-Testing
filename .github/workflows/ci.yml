name: Trading Agent CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Ruff
        run: uv tool install ruff

      - name: Run Ruff linter
        run: ruff check agents/ mcp_servers/

      - name: Run Ruff formatter check
        run: ruff format --check agents/ mcp_servers/


  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit -v --disable-warnings


  deepeval-tests:
    name: DeepEval Tests
    runs-on: ubuntu-latest
    needs: unit-tests  # Les tests unitaires doivent passer avant

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPEVAL_RESULTS_FOLDER: ./deepeval-results

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run DeepEval tests
        run: uv run deepeval test run tests/test_agent_answers.py -v
        # Continue même si les tests échouent pour pouvoir uploader le rapport
        continue-on-error: true

      - name: Upload DeepEval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deepeval-report
          path: ./deepeval-results/
          retention-days: 14