# GitHub Actions CI for running pytest with uv
name: CI

on:
	push:
		branches: [ main ]
	pull_request:
		branches: [ main ]

jobs:
	test:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v3
			- name: Set up Python
				uses: actions/setup-python@v4
				with:
					python-version: '3.11'
			- name: Install uv
				run: pip install uv
			- name: Install dependencies with uv
				run: uv pip install -r pyproject.toml
			- name: Run pytest: test_agent_logic
				run: pytest src/tests/test_unit/test_agent_logic.py
			- name: Run pytest: test_mcp_srever_strat_pred
				run: pytest src/tests/test_unit/test_mcp_srever_strat_pred.py
